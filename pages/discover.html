<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover - CCT383 App</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../styles/discover.css">
</head>
<body>
  <div class="demo-container">
    <!-- iPhone 13 Pro Frame -->
    <div class="iphone-frame">
      <div class="iphone-screen">
        <div class="app-shell">
          <!-- Header with Search -->
          <header class="header">
            <div class="search-bar">
              <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <input 
                type="text" 
                class="search-bar__input" 
                placeholder="Search activities..."
              >
            </div>
          </header>

          <!-- Main Content Area -->
          <main class="main-content">
            <div class="page">
              <!-- Content will be added here -->
            </div>
          </main>

          <!-- Bottom Tab Bar -->
          <nav class="tab-bar">
            <div class="tab-bar__item tab-bar__item--active">
              <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M2 12h20"></path>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              </svg>
              <span class="tab-bar__label">Discover</span>
            </div>
            
            <div class="tab-bar__item">
              <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="3 6 5 6 21 21 19 21 3 6"></polygon>
                <line x1="9" y1="18" x2="15" y2="18"></line>
              </svg>
              <span class="tab-bar__label">Mapping</span>
            </div>
            
            <div class="tab-bar__item">
              <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              <span class="tab-bar__label">Routes</span>
            </div>
            
            <div class="tab-bar__item">
              <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span class="tab-bar__label">Community</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
