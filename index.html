<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCT383 App - Travel Planning Platform</title>
  <link rel="stylesheet" href="css/main.css">
  <meta http-equiv="refresh" content="0; url=宣传网站2/web_page.html">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .loading-container {
      text-align: center;
      color: white;
      padding: 40px;
      max-width: 500px;
    }
    
    .loading-container h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    
    .loading-container p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .manual-link {
      display: inline-block;
      padding: 12px 30px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .manual-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loading-spinner"></div>
    <h1>Welcome to CCT383 App</h1>
    <p>Your one-stop travel planning platform</p>
    <p>Redirecting to TripTailor campaign page...</p>
    <a href="宣传网站2/web_page.html" class="manual-link">Enter Campaign →</a>
  </div>
  
  <script>
    // Auto redirect after a short delay
    setTimeout(function() {
      window.location.href = '宣传网站2/web_page.html';
    }, 1500);
  </script>
</body>
</html>
